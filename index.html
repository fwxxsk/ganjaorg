<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; height: 100vh; width: 100vw; align-items: center; justify-content: center; font-family: sans-serif; color: #888;">
        LOADING_GANJA_SYSTEM...
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var extra = error ? '<br>STACK: ' + error.stack : '';
        document.body.innerHTML = '<div style="color:red; padding:20px; font-family:monospace; background:white; position:absolute; inset:0; z-index:9999;"><h1>RUNTIME_ERROR</h1>' + msg + '<br>AT: ' + url + ':' + line + extra + '</div>';
      };
      console.log("Entry script starting...");
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
